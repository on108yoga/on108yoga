<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>


    <style>
        header{
            width: 100%;
        }
        .navbar{
            justify-content: center;
            display: flex;
            text-align: center;
            gap: 15px;
            background-color: #517e73;       
        }
        .navbar a{
            color: white;
            text-decoration: none;
        }
        body{
            text-align: center;
        }
        h1 {
            background-color: #fff5de;
            text-align: center;
            letter-spacing: 0.3em;
            margin: 0;
            padding: 20px 0;
        }
        main{
            margin: 0;
            display: flex;
            justify-content: center; /* 가로 중앙 */
            /* align-items: center;     /* 세로 중앙 */
            height: 100vh;
            }       
    
        section{
            width: 300px;
            text-align: center;
        }
        #loginForm{
            border: 1px solid red;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        form {
            max-width: 420px;
            margin: 40px auto;
            padding: 30px;

            background: #fff;
            border-radius: 16px;

            box-shadow: 0 10px 25px rgba(0,0,0,.08);
        }

    </style>
</head>

<body>

<header>    
    <nav class="navbar">
        <a href="index.html">home</a>
        <a href="signup.html">join</a>
    </nav>
    <h1>ON108YOGA</h1>
</header>

<main>
<div class="aside01"></div>
<section class="login-container">
    <h2>로그인</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">전화번호</label>
            <input
                type="text"
                id="phone"
                placeholder="01012345678"
                required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                placeholder="비밀번호를 입력하세요"
                required>
        </div>

        <div class="remember-box">
            <label>
                <input type="checkbox" id="remember">
                로그인 상태 유지
            </label>
        </div>

        <button type="submit" id="loginBtn">
            로그인
        </button>

    </form>

    <div class="login-menu">

        <a href="signup.html">
            회원가입
        </a>

        <span>|</span>

        <a href="forgot.html">
            비밀번호 찾기
        </a>

    </div>

</section>
<div class="aside02"></div>
</main>

<footer>

<p>© 2026 Reservation System</p>

</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
    
</body>
</html>
