<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>


    <style>
     h1{
            width: 200px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            background-color: aqua;
        }
        nav ul{
            list-style: none;
            display: flex;
            gap: 10px;
        }
        nav li {
            width: 80px;
            display: block;
            background-color: burlywood;
        }
        header div{
            background-color: aliceblue;
        }
        
        header{display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: cadetblue;
        }
        .navbar{
            justify-content: center;
            display: flex;
            text-align: center;
            gap: 15px;            
        }
        body{
            text-align: center;
        }
      
        main{
            margin: 0;
            display: flex;
            justify-content: center; /* 가로 중앙 */
            /* align-items: center;     /* 세로 중앙 */
            height: 100vh;
            }
        section{
            width: 300px;
            text-align: center;
        }
        #loginForm{
            border: 1px solid red;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        @media all and (max-width:768px){
            main{
                flex-direction: column;
            }
            section{
                order:0;
            }
            .aside01{
                order:1;                
            }
            .aside02{
                order:2;                
            }
        }
    </style>
</head>

<body>

<header>
    <h1>YOGA</h1>
    <nav class="navbar">
        <a href="index.html">home</a>
        <a href="signup.html">join</a>
    </nav>
</header>

<main>
<div class="aside01"></div>
<section class="login-container">
    <h2>로그인</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">이메일</label>
            <input
                type="email"
                id="email"
                placeholder="example@email.com"
                required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                placeholder="비밀번호를 입력하세요"
                required>
        </div>

        <div class="remember-box">
            <label>
                <input type="checkbox" id="remember">
                로그인 상태 유지
            </label>
        </div>

        <button type="submit" id="loginBtn">
            로그인
        </button>

    </form>

    <div class="login-menu">

        <a href="signup.html">
            회원가입
        </a>

        <span>|</span>

        <a href="forgot.html">
            비밀번호 찾기
        </a>

    </div>

</section>
<div class="aside02"></div>
</main>

<footer>

<p>© 2026 Reservation System</p>

</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
    
</body>
</html>
