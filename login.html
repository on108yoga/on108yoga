<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
     <!-- 구글 폰트 및 프리텐다드 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
     @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@200;300;400;500;700&display=swap');
 
     * {
        box-sizing: border-box;
        }
        
        body {
            text-align: center;
            margin: 0;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }
        .navbar{
               justify-content: center;
                display: flex;
                text-align: center;
                align-items: center;
                gap: 15px;
                background-color: #517e73;
                padding: 10px;
                font-size: 14px;     
        }
        .navbar a{
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
         .navbar a:hover {
            text-decoration: underline;
        }
        
        body{
            width: 100%;
            text-align: center;
        }
        h1 {
                background-color: #f4efe6; /* 따뜻하고 세련된 샌드 베이지 */
            color: #3f4e43;            /* 딥 그린 폰트 컬러 */
            text-align: center;
            letter-spacing: 0.35em;
            margin: 0;
            padding: 12px 0;           /* 🔥 높이 축소 */
            font-family: 'Cormorant Garamond', 'Noto Sans KR', serif;
            font-weight: 300;
            font-size: 20px;
            text-transform: uppercase;
                }

        /* 메인 */
        main{
            margin: 0;
            display: flex;
            justify-content: center; /* 가로 중앙 */
            /* align-items: center;     /* 세로 중앙 */
            height: 100vh;
            }       
    
        section{
            width: 300px;
            text-align: center;
        }
        #loginForm{
            border: 1px solid red;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        form {
            max-width: 420px;
            margin: 40px auto;
            padding: 30px;

            background: #fff;
            border-radius: 16px;

            box-shadow: 0 10px 25px rgba(0,0,0,.08);
        }

    </style>
</head>

<body>
<header>
    <nav class="navbar">
        <a href="index.html">홈</a>
        <a href="login.html">로그인</a>
    </nav>
    
    <h1>
    ON108 YOGA
    <span style="display: block; font-size: 11px; font-weight: 200; letter-spacing: 0.2em; margin-top: 4px; color: #777;">
        온108요가
    </span>
    </h1>
</header>

<main>
<div class="aside01"></div>
<section class="login-container">
    <h2>로그인</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">전화번호</label>
            <input
                type="text"
                id="phone"
                placeholder="01012345678"
                required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                placeholder="비밀번호를 입력하세요"
                required>
        </div>

        <div class="remember-box">
            <label>
                <input type="checkbox" id="remember">
                로그인 상태 유지
            </label>
        </div>

        <button type="submit" id="loginBtn">
            로그인
        </button>

    </form>

    <div class="login-menu">

        <a href="signup.html">
            회원가입
        </a>

        <span>|</span>

        <a href="forgot.html">
            비밀번호 찾기
        </a>

    </div>

</section>
<div class="aside02"></div>
</main>

<footer>

<p>© 2026 Reservation System</p>

</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
    
</body>
</html>
