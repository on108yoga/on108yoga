<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 내 수강권 현황</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --border: #e5e7eb;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: var(--text-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .mypage-container { width: 100%; max-width: 480px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .welcome-msg { font-size: 20px; font-weight: bold; margin: 0; }
        .welcome-sub { font-size: 14px; color: var(--text-gray); margin-top: 5px; }

        /* 수강권 카드 디자인 */
        .ticket-card { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .ticket-name { font-size: 14px; opacity: 0.9; margin-bottom: 8px; font-weight: 500; }
        .ticket-title { font-size: 22px; font-weight: bold; margin: 0 0 20px 0; }
        
        .count-info { display: flex; justify-content: space-between; align-items: baseline; }
        .count-label { font-size: 13px; opacity: 0.8; }
        .count-value { font-size: 36px; font-weight: 800; }
        .count-total { font-size: 16px; opacity: 0.8; font-weight: normal; }

        /* 상세 내역 리스트 */
        .detail-list { border-top: 1px solid var(--border); padding-top: 20px; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--border); font-size: 15px; }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { color: var(--text-gray); }
        .detail-val { font-weight: 600; }
        
        /* 버튼 및 링크 */
        .btn-home { display: block; text-align: center; background-color: var(--primary-light); color: var(--primary); text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 25px; transition: background 0.2s; }
        .btn-home:hover { background-color: #c7d2fe; }

        /* 수강권이 없는 경우 */
        .no-ticket { text-align: center; padding: 40px 0; color: var(--text-gray); }
        .no-ticket-icon { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="mypage-container">
    <div class="header">
        <p class="welcome-msg" id="user-name">불러오는 중...</p>
        <p class="welcome-sub" id="user-phone">010-0000-0000</p>
    </div>

    <div id="ticket-section" style="display: none;">
        <div class="ticket-card">
            <div class="ticket-name">보유 수강권</div>
            <p class="ticket-title" id="ticket-title">개인레슨 10회권</p>
            <div class="count-info">
                <span class="count-label">남은 횟수</span>
                <div>
                    <span class="count-value" id="remaining-count">0</span>
                    <span class="count-total" id="total-count">/ 0회</span>
                </div>
            </div>
        </div>

        <div class="detail-list">
            <div class="detail-item">
                <span class="detail-label">시작일</span>
                <span class="detail-val" id="start-date">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">만료 기한</span>
                <span class="detail-val" id="end-date">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">남은 취소 가능 횟수</span>
                <span class="detail-val" id="cancel-count" style="color: #ef4444;">0회</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">상태</span>
                <span class="detail-val" id="ticket-status">-</span>
            </div>
        </div>
    </div>

    <div id="no-ticket-section" class="no-ticket" style="display: none;">
        <div class="no-ticket-icon">🎫</div>
        <h3>등록된 수강권이 없습니다.</h3>
        <p>스튜디오에 문의하여 이용권을 등록해 주세요.</p>
    </div>

    <a href="index.html" class="btn-home">메인 화면으로 이동</a>
</div>

<script type="module" src="mypage.js"></script>
</body>
</html>
