<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>마이페이지</title>
<style>
          *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .wrap{
             width:100%;
             min-height:100vh;
         }
        header{
            width: 100%;
            height: 100px;
            background-color: rgb(203, 214, 214);
        }
        main{
             width:100%;
             min-height:calc(100vh - 200px);
             display:flex;
         }
        .aside01{flex:1; background-color: darkgoldenrod;}
        section{flex:4; background-color: darkkhaki;}
        .aside02{flex: 1;}
        footer{
              width: 100%;
            height: 100px;
            background-color: rgb(80, 87, 87);
        }

         .mypage{

width:350px;

margin:50px auto;

}


.user-box,
.reservation-box{

border:1px solid #ddd;

padding:20px;

margin-bottom:20px;

border-radius:12px;

}



.reservation-card{

display:flex;

justify-content:space-between;

align-items:center;

padding:10px;

margin:10px 0;

background:#f5f5f5;

border-radius:8px;

}



button{

cursor:pointer;

}


button:hover{

background:#405346;

color:white;

}
         

       @media(max-width:768px){                  
                  main{                  
                      flex-direction:column;                  
                  }                  
                  .aside01,
                  .aside02{                  
                      display:none;                  
                  }                  
                  .mypage{                  
                      width:95%;                  
                      margin:20px auto;                  
                  }
         }
</style>
</head>


<body>
<div class="wrap">
<header>
  <nav>
    <ul>
      <li>홈</li>
      <li>예약</li>
    </ul>
  </nav>
  <h1>LOGO</h1>       
</header>

<main>

<div class="aside01"></div>
<section class="mypage">

<h2>
마이페이지
</h2>


<div class="user-box">

<h3>
회원정보
</h3>


<p>
이름 :
<span id="userName"></span>
</p>


<p>
전화번호 :
<span id="userPhone"></span>
</p>


</div>




<div class="reservation-box">


<h3>
내 예약
</h3>


<div id="myReservations">

예약 불러오는 중...

</div>


</div>



<button id="logoutBtn">

로그아웃

</button>


</section>

<div class="aside02"></div>
</main>

<footer></footer>
</div>
  
<script type="module" src="firebase.js"></script>

<script type="module" src="mypage.js"></script>


</body>

</html>
