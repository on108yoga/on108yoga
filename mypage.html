<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 이용권 현황</title>
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;        
        }
        /* 네비게이션 바 */
            .menu {
                justify-content: center;
                display: flex;
                text-align: center;
                align-items: center;
                gap: 15px;
                background-color: #517e73;
                padding: 10px;
                font-size: 14px;
            }
            .menu a {
                color: white;
                text-decoration: none;
                font-weight: 500;
            }
            .menu a:hover {
                text-decoration: underline;
            }
            #userInfo {
                color: #fff;
                font-weight: bold;
            }
            
            h1 {
                background-color: #fff5de;
                text-align: center;
                letter-spacing: 0.3em;
                margin: 0;
                padding: 20px 0;
                color: #333;
            }
        
        main{
            padding-bottom: 20px;
        }
        p{
            color: gray;
            font-size: 14px;
        }
        
        
        .mypage-container {
            max-width: 480px;
            margin: 0 auto;
        }

        .welcome-section {
            margin-bottom: 24px;
        }

        .welcome-section h1 {
            font-size: 22px;
            margin: 0 0 4px 0;
            font-weight: 700;
        }

        .welcome-section p {
            color: var(--text-sub);
            margin: 0;
            font-size: 14px;
        }

        /* 대시보드 카드 스타일 */
        .info-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 이용권 이름 강조 */
        .ticket-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        /* 수치 강조 그리드 */
        .count-grid {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .count-box {
            flex: 1;
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .count-box .label {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .count-box .value {
            font-size: 18px;
            font-weight: 700;
        }

        /* 날짜 및 상세 리스트 */
        .detail-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px dashed var(--border-color);
        }

        .detail-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .detail-item .title {
            color: var(--text-sub);
        }

        .detail-item .content {
            font-weight: 500;
        }

        /* 남은 횟수 강조용 배지 */
        .badge {
            background-color: #e0e7ff;
            color: var(--primary-color);
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }
        
        .badge.danger {
            background-color: #fee2e2;
            color: #ef4444;
        }
        footer {
            width: 100%
            margin-top: 40px;
            padding: 20px;
            background: #eee;
            font-size: 12px;
            color: #777;
        }

        /* 예약현황 css */
                .my-reservations-section {
                margin-top: 24px;
                padding: 0 16px; /* 모바일 좌우 여백 */
            }
            
            .reservation-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-top: 12px;
            }
            
            /* 개별 예약 카드 */
            .reservation-card {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: #f9f9f9;
                border: 1px solid #eee;
                border-radius: 12px;
                padding: 16px;
            }
            
            .res-info {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            
            .res-date { font-weight: bold; font-size: 15px; }
            .res-time { color: #555; font-size: 14px; }
            
            /* 상태 태그 */
            .badge {
                padding: 4px 8px;
                border-radius: 6px;
                font-size: 12px;
                font-weight: bold;
            }
            .badge-active { background-color: #e6f7ff; color: #1890ff; }
            .badge-canceled { background-color: #fff1f0; color: #ff4d4f; }
            
            /* 취소 버튼 */
            .btn-cancel {
                margin-left: 8px;
                padding: 6px 12px;
                background-color: #ff4d4f;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
            }
                    
       /* 모바일 화면 여백 설정 */
        @media (max-width: 768px) {
            body {
                padding: 0 16px; /* 전체 화면 좌우 여백 16px */
                box-sizing: border-box;
            }

            /* 표를 감싸는 영역이나 table 태그 */
            table {
                padding: 0 16px;
                width: 100% !important;
                margin: 0 auto;
            }

            table th, table td {
                padding: 10px 8px; /* 표 안쪽 셀 여백 */
            }
        }
    </style>
</head>
<body>
        <header>    
    <nav class="menu">
        <a href="index.html">홈</a>
        <a href="reservation.html">예약</a>
        <a href="mypage.html">마이페이지</a>
        <span id="userInfo"></span>
        <button id="logoutBtn">로그아웃</button>
    </nav>
    <h1>LOGO</h1>
    </header>

    <main>
    <div class="mypage-container">
    <!-- 상단 인사말 -->
    <div class="welcome-section">
        <h2>안녕하세요, <span id="user-name">회원</span>님!</h2>
        <p>오늘도 건강하고 즐거운 하루 되세요.</p>
    </div>

    <!-- 1. 이용권 정보 카드 -->
    <div class="info-card">
       <!-- mypage.html 예시 -->
        <p>아이디: <span id="user-id">로딩 중...</span></p>
        <div class="card-title">My Ticket</div>
        <div id="ticket-name" class="ticket-name">보유하신 이용권이 없습니다.</div>
        
        <div class="count-grid">
            <div class="count-box">
                <div class="label">총 등록 횟수</div>
                <div id="total-count" class="value">0회</div>
            </div>
            <div class="count-box" style="background: #eef2ff;">
                <div class="label" style="color: var(--primary-color); font-weight: 600;">남은 이용 횟수</div>
                <div id="remaining-count" class="value" style="color: var(--primary-color);">0회</div>
            </div>
        </div>

        <ul class="detail-list">
            <li class="detail-item">
                <span class="title">시작일</span>
                <span id="start-date" class="content">-</span>
            </li>
            <li class="detail-item">
                <span class="title">종료일</span>
                <span id="end-date" class="content">-</span>
            </li>
        </ul>
    </div>

        <!-- 마이페이지 예약 내역 세션 -->
        <div class="my-reservations-section">
            <h3>🗓️ 내 예약 현황</h3>
            
            <!-- 로딩 중 또는 데이터가 없을 때 메시지 -->
            <div id="reservation-loading" style="text-align: center; color: #888;">
                예약 내역을 불러오는 중...
            </div>
        
            <!-- 예약 목록이 들어갈 컨테이너 -->
            <div id="reservation-list" class="reservation-list"></div>
        </div>

    <!-- 2. 취소 제한 규정 카드 -->
    <div class="info-card">
        <div class="card-title">Cancel Policy</div>
        
        <ul class="detail-list">
            <!-- A안: 전체 기간 취소 한도 -->
            <li class="detail-item" style="align-items: center; padding: 12px 0;">
                <div>
                    <span class="title" style="display:block; font-weight: 600; color: var(--text-main);">총 취소 가능 횟수</span>
                    <span style="font-size: 11px; color: var(--text-sub);">이번 이용권 기간 내 전체 한도</span>
                </div>
                <span class="content">
                    <span id="remaining-cancel" class="badge">0회</span> / <span id="total-cancel">0회</span>
                </span>
            </li>
            
            <!-- B안: 당일 취소 한도 -->
            <li class="detail-item" style="align-items: center; padding: 12px 0;">
                <div>
                    <span class="title" style="display:block; font-weight: 600; color: var(--text-main);">당일 취소 가능 횟수</span>
                    <span style="font-size: 11px; color: var(--text-sub);">하루 동안 가능한 취소 한도</span>
                </div>
                <span class="content">
                    <span id="remaining-today-cancel" class="badge danger">0회</span> / <span id="total-today-cancel">0회</span>
                </span>
            </li>
        </ul>
    </div>
</div>
        </main>

    <footer>
         <p>© 2026 On108Yoga Reservation</p>
    </footer>

<!-- Firebase SDK 및 데이터 연동 스크립트 -->
<script type="module" src="mypage.js"></script>
</body>
</html>
