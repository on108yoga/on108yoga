<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>회원관리</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{

background:#f5f5f5;

}

/* ====================== */

header{

background:#6b5e5e;

color:white;

padding:20px;

}

header h1{

text-align:center;

margin-bottom:15px;

}

nav{

display:flex;

justify-content:center;

gap:20px;

}

nav a{

color:white;

text-decoration:none;

font-weight:bold;

}

nav a:hover{

color:#ffd56a;

}

/* ====================== */

main{

max-width:1200px;

margin:auto;

padding:30px;

}

h2{

margin-bottom:20px;

}

/* 검색 */
.toolbar{display:flex;}

.search{

display:flex;

gap:10px;

margin-bottom:25px;

}

.search input{

flex:1;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

.search button{

padding:12px 25px;

border:none;

background:#6b5e5e;

color:white;

border-radius:8px;

cursor:pointer;

}

/* =========멤버=========== */

.member-list{
  border: 2 solid gray;
  background-color: white;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  cursor: pointer;
  gap:20px;
  border-radius: 20px;  
  margin: auto;
  }
.member-item{display: flex;}
.member-item:hover{
    background-color: gray;
  }
.member-item.active{
background:#6b5e5e;
color:white;
}
#memberName{
 width: 200px;
 background-color: yellow;
}
 
 

.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 4px 12px rgba(0,0,0,.1);

}

.card h3{

margin-bottom:15px;

}

.card p{

margin:8px 0;

}

/* 버튼 */
button{
    width: 80px;
    padding: 15px;
    background-color: tomato;
    color: white;
    font-size: 12px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    }
  button:hover{
    color: black;
  }
  
.saveBtn{width:10px;}
.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.buttons button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.ticket{

background:#5c7cfa;

color:white;

}
.ticket-buttons{

display:flex;

gap:10px;

margin:20px 0;

flex-wrap:wrap;

}

.ticket-buttons button{

flex:1;

width:20px;

padding:12px;

cursor:pointer;

border:none;

border-radius:8px;

background:#5c7cfa;

color:white;

font-weight:bold;

}

.ticket-buttons button:hover{

background:#3b5bdb;

}
  
.edit{

background:#20c997;

color:white;

}

.delete{

background:#fa5252;

color:white;

}

.buttons button:hover{

transform:translateY(-2px);

opacity:.9;

}

/* ====================== */

@media(max-width:768px){

main{

padding:15px;

}

}

</style>

</head>

<body>

<header>

<h1>회원관리</h1>

<nav>

<a href="admin.html">관리자 홈</a>

<a href="reservations.html">예약관리</a>

<a href="tickets.html">이용권관리</a>

<a href="attendance.html">출석관리</a>

</nav>

</header>

<main>

<h2>회원관리</h2>

<div class="toolbar">

<input
type="text"
id="searchInput"
placeholder="이름 또는 전화번호 검색">

<button id="searchBtn">
검색
</button>
<br>
</div>

  <div class="admin-wrap">

    <div class="member-list">

        <div id="memberList"></div>

    </div>
<hr><br>
  <div class="member-detail">
  
  <h3 id="memberName">
  회원을 선택하세요
  </h3>
  
  <p>
  전화번호 :
  <span id="memberPhone"></span>
  </p>
  
  <hr>
  
  <p>
  남은 이용권 :
  <span id="remainTicket"></span>회
  </p>
  
  <p>
  총 구매 :
  <span id="totalTicket"></span>회
  </p>
  
  <p>
  사용 :
  <span id="usedTicket"></span>회
  </p>
  
  <hr>
  
    <p>    
    일반취소 가능    
    <input
    type="number"
    id="cancelRemain"
    min="0">    
    </p>    
    <p>    
    당일취소 가능    
    <input
    type="number"
    id="sameDayCancelRemain"
    min="0">    
    </p>
  
  <hr>
   <div class="ticket-buttons">
  
    <button id="plus1">+1회</button>
    
    <button id="plus5">+5회</button>
    
    <button id="plus10">+10회</button>
    
    <button id="plus20">+20회</button>
    
    <button id="plus50">+50회</button>
  
  </div>

    <h3>이용권 등록</h3>

<button id="ticket5">5회권 등록<br><small>(20일)</small></button>

<button id="ticket10">10회권 등록<br><small>(40일)</small></button>

<button id="ticket20">20회권 등록<br><small>(80일)</small></button>

<button id="ticket30">30회권 등록<br><small>(120일)</small></button>

<button id="ticket50">50회권 등록<br><small>(200일)</small></button>
  <br><br>
    
  <span id="saveStatus"></span> <br>
    
  <button id="saveBtn">
  저장
  </button>
  
  </div>

</main>

<script type="module" src="firebase.js"></script>
<script type="module" src="members.js"></script>

</body>

</html>
