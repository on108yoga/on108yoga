<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>회원관리</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"맑은 고딕";
}

body{

background:#f5f5f5;

}

/* ====================== */

header{

background:#6b5e5e;

color:white;

padding:20px;

}

header h1{

text-align:center;

margin-bottom:15px;

}

nav{

display:flex;

justify-content:center;

gap:20px;

}

nav a{

color:white;

text-decoration:none;

font-weight:bold;

}

nav a:hover{

color:#ffd56a;

}

/* ====================== */

main{

max-width:1200px;

margin:auto;

padding:30px;

}

h2{

margin-bottom:20px;

}

/* 검색 */

.search{

display:flex;

gap:10px;

margin-bottom:25px;

}

.search input{

flex:1;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

.search button{

padding:12px 25px;

border:none;

background:#6b5e5e;

color:white;

border-radius:8px;

cursor:pointer;

}

/* ====================== */

.member-list{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

gap:20px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 4px 12px rgba(0,0,0,.1);

}

.card h3{

margin-bottom:15px;

}

.card p{

margin:8px 0;

}

/* 버튼 */

.buttons{

display:flex;

gap:10px;

margin-top:15px;

}

.buttons button{

flex:1;

padding:12px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

transition:.2s;

}

.ticket{

background:#5c7cfa;

color:white;

}

.edit{

background:#20c997;

color:white;

}

.delete{

background:#fa5252;

color:white;

}

.buttons button:hover{

transform:translateY(-2px);

opacity:.9;

}

/* ====================== */

@media(max-width:768px){

main{

padding:15px;

}

}

</style>

</head>

<body>

<header>

<h1>회원관리</h1>

<nav>

<a href="admin.html">관리자 홈</a>

<a href="reservations.html">예약관리</a>

<a href="tickets.html">이용권관리</a>

<a href="attendance.html">출석관리</a>

</nav>

</header>

<main>

<h2>회원관리</h2>

<div class="toolbar">

<input
type="text"
id="searchInput"
placeholder="이름 또는 전화번호 검색">

<button id="searchBtn">
검색
</button>

</div>

<table class="member-table">

<thead>

<tr>

<th>번호</th>

<th>이름</th>

<th>전화번호</th>

<th>남은횟수</th>

<th>권한</th>

<th>관리</th>

</tr>

</thead>

<tbody id="memberTableBody">

</tbody>

</table>

</main>

<script type="module" src="firebase.js"></script>
<script type="module" src="members.js"></script>

</body>

</html>
