<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스튜디오 회원 및 이용권 관리</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card: #ffffff;
            --border: #e5e7eb;
            --text: #1f2937;
        }
        .navbar{
            justify-content: center;
            text-align: center;
            gap: 15px;
            background-color: #517e73;       
        }
        .navbar a{
            color: white;
            text-decoration: none;
            width: 50px;
        }
        h1 {
            background-color: #fff5de;
            text-align: center;
            letter-spacing: 0.3em;
            margin: 0;
            padding: 20px 0;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        header {justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-box { padding: 10px; width: 260px; border: 1px solid var(--border); border-radius: 6px; }
        
        /* 메인 레이아웃 (좌우 분할) */
        .main-container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        
        /* 1. 회원 리스트 영역 (왼쪽) */
        .member-list-section { flex: 1; background: var(--card); border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .list-header { padding: 15px 20px; background: #f9fafb; border-bottom: 1px solid var(--border); font-weight: bold; }
        .member-list { overflow-y: auto; flex: 1; }
        .member-item { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .member-item:hover { background: #f9fafb; }
        .member-item.active { background: #e0e7ff; border-left: 4px solid var(--primary); }
        .member-name { font-weight: bold; }
        .member-phone { color: #6b7280; font-size: 13px; }

        /* 2, 3, 4. 회원 상세 및 이용권 설정 영역 (오른쪽) */
        .member-detail-section { flex: 1.2; background: var(--card); border-radius: 8px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .placeholder-text { margin: auto; color: #9ca3af; text-align: center; }
        
        .detail-header { border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .detail-title { font-size: 20px; font-weight: bold; margin: 0 0 5px 0; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f9fafb; padding: 15px; border-radius: 6px; }
        .info-label { font-size: 13px; color: #6b7280; margin-bottom: 3px; }
        .info-value { font-weight: 600; font-size: 15px; }

        /* 이용권 변경/수정 폼 */
        .ticket-management { border: 1px solid var(--border); padding: 20px; border-radius: 8px; background: #fcfcfd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; flex: 1; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #9ca3af; color: white; }

        /* 등록 팝업 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 380px; }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <h1>LOGO</h1>
        <a href="index.html">home</a>
    </nav>    
    <hr><br>
    
    <h2>스튜디오 회원 관리 대시보드</h2>
    <div>
        <input type="text" id="search-input" class="search-box" placeholder="이름 또는 연락처 검색...">
        <button class="btn btn-primary" onclick="openModal()" style="display:inline-block; width:auto; padding: 8px 15px;">+ 신규 회원 추가</button>
    </div>
</header>

<div class="main-container">
    <div class="member-list-section">
        <div class="list-header">전체 회원 목록</div>
        <div class="member-list" id="member-list-container"></div>
    </div>

    <div class="member-detail-section" id="detail-section">
        <div class="placeholder-text" id="detail-placeholder">
            <h3>회원을 선택해 주세요</h3>
            <p>목록에서 회원을 클릭하면 상세 정보 조회 및 이용권 수정이 가능합니다.</p>
        </div>
        
        <div id="detail-content" style="display: none;">
            <div class="detail-header">
                <p class="detail-title" id="det-name">홍길동 회원님</p>
                <span id="det-phone" style="color:#6b7280;">010-1234-5678</span>
            </div>

            <h3>현재 사용 중인 이용권</h3>
            <div class="info-grid">
                <!-- 1. 이용권 구분 -->
                <div>
                    <div class="info-label">이용권 구분</div>
                    <div class="info-value" id="cur-ticket">-</div>
                </div>
            
                <!-- 2. 이용권 잔여 횟수 -->
                <div>
                    <div class="info-label">이용권 잔여 횟수</div>
                    <div class="info-value" id="cur-count" style="color: var(--primary);">-</div>
                </div>
            
                <!-- 3. 일반 취소 남은 횟수 -->
                <div>
                    <div class="info-label">남은 취소 횟수</div>
                    <div class="info-value" id="cur-cancel-count" style="color: #ef4444;">-</div>
                </div>
            
                <!-- 4. 당일 취소 남은 횟수 -->
                <div>
                    <div class="info-label">남은 당일취소 횟수</div>
                    <div class="info-value" id="cur-today-cancel-count" style="color: #f59e0b;">-</div>
                </div>
            
                <!-- 5. 이용 기간 (2열 전체 차지) -->
                <div style="grid-column: span 2;">
                    <div class="info-label">이용 기간 (시작일 ~ 만료일)</div>
                    <div class="info-value" id="cur-period">-</div>
                </div>
            </div>
          
            <h3>이용권 설정 및 변경</h3>
            <div class="ticket-management">
                <div class="form-group">
                    <label>이용권 템플릿 선택</label>
                    <!-- 1. 이용권 수정 영역 드롭다운 -->
                        <select id="edit-template-select" onchange="applyTemplateToEdit()">
                            <option value="">-- 직접 입력 또는 요금제 선택 --</option>
                            <option value="1,7,1,1">1회 / 7일 (취소 1회, 당일취소 1회)</option>
                            <option value="5,20,2,1">5회 / 20일 (취소 2회, 당일취소 1회)</option>
                            <option value="10,40,4,2">10회 / 40일 (취소 4회, 당일취소 2회)</option>
                            <option value="20,80,8,4">20회 / 80일 (취소 8회, 당일취소 4회)</option>
                            <option value="30,120,12,6">30회 / 120일 (취소 12회, 당일취소 6회)</option>
                            <option value="50,200,20,10">50회 / 200일 (취소 20회, 당일취소 10회)</option>
                        </select>
                </div>

                <div class="form-group" style="margin-bottom: 12px;">
                    <label>이용권 명칭</label>
                    <input type="text" id="edit-ticket-type">
                </div>             
                    
                <!-- 💡 [핵심 추가] 이용권 횟수 설정 (총 횟수 / 잔여 횟수 입력) -->
                <div style="margin-bottom: 12px;">
                    <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">이용권 횟수 설정</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="edit-total-count" placeholder="총 횟수" style="width: 50%;">
                        <input type="number" id="edit-remaining-count" placeholder="잔여 횟수" style="width: 50%;">
                    </div>
                </div>

                <!-- 취소 횟수 설정 (A안) --> 
                <div style="margin-bottom: 12px;">
                    <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">일반 취소 횟수 설정</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="edit-total-cancel" placeholder="총 한도" style="width: 50%;">
                        <input type="number" id="edit-remaining-cancel" placeholder="현재 남은 횟수" style="width: 50%;">
                    </div>
                </div>
                
                <!-- 당일 취소 횟수 설정 (B안) -->
                <div style="margin-bottom: 12px;">
                    <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">당일 취소 횟수 설정</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="edit-total-today-cancel" placeholder="당일 총 한도" style="width: 50%;">
                        <input type="number" id="edit-remaining-today-cancel" placeholder="당일 남은 횟수" style="width: 50%;">
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;">
                        <label>시작일</label>
                        <input type="date" id="edit-start-date" onchange="calculateEditEndDate()">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>만료일</label>
                        <input type="date" id="edit-end-date">
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="updateUserTicket()">이용권 저장/수정</button>
                    <button type="button" class="btn" style="background-color: #f97316; color: white;" onclick="refundUserTicket()">이용권 환불/취소</button>
                    <button class="btn btn-secondary" onclick="resetUserTicket()">이용권 초기화(제거)</button>
                    <button class="btn btn-danger" onclick="deleteCurrentMember()">회원 삭제</button>
                </div> 

                <!-- 이용권 설정 및 변경 폼 밑에 추가 -->
                    <div style="margin-top: 30px;">
                        <h3>결제 및 환불 내역</h3>
                        <div style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px;">
                            <table style="width: 100%; border-collapse: collapse; text-align: center; font-size: 13px;">
                                <thead style="background: #f9fafb; position: sticky; top: 0; border-bottom: 1px solid var(--border);">
                                    <tr>
                                        <th style="padding: 8px;">일시</th>
                                        <th style="padding: 8px;">구분</th>
                                        <th style="padding: 8px;">이용권 명</th>
                                        <th style="padding: 8px;">횟수</th>
                                        <th style="padding: 8px;">금액</th>
                                    </tr>
                                </thead>
                                <tbody id="payment-history-list">
                                    <tr>
                                        <td colspan="5" style="padding: 15px; color: #9ca3af;">내역이 없습니다.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

            </div>
        </div>
    </div>
</div>

<div id="register-modal" class="modal">
    <div class="modal-content">
        <h3>신규 회원 등록</h3>
        <form id="register-form">
            <div class="form-group"><label>이름</label><input type="text" id="reg-name" required></div>
            <div class="form-group"><label>연락처</label><input type="tel" id="reg-phone" placeholder="01012345678" required></div>
            
            <div class="form-group">
                <label>이용권 프리셋</label>
                <!-- 2. 신규 회원 등록 모달 드롭다운 -->
                    <select id="reg-template" onchange="applyTemplateToReg()">
                        <option value="">직접 설정</option>
                        <option value="1,7,1,1">1회 / 7일 (취소 1회, 당일취소 1회)</option>
                        <option value="5,20,2,1">5회 / 20일 (취소 2회, 당일취소 1회)</option>
                        <option value="10,40,4,2">10회 / 40일 (취소 4회, 당일취소 2회)</option>
                        <option value="20,80,8,4">20회 / 80일 (취소 8회, 당일취소 4회)</option>
                        <option value="30,120,12,6">30회 / 120일 (취소 12회, 당일취소 6회)</option>
                        <option value="50,200,20,10">50회 / 200일 (취소 20회, 당일취소 10회)</option>
                    </select>
            </div>

            <!-- 기본 취소 가능 횟수 -->
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">기본 취소 가능 횟수</label>
                <input type="number" id="reg-cancel-count" placeholder="예: 3 (미입력 시 0)">
            </div>

            <!-- 기본 당일취소 가능 횟수 -->
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px;">기본 당일취소 가능 횟수</label>
                <input type="number" id="reg-today-cancel-count" placeholder="예: 1 (미입력 시 0)">
            </div>
                        
            <div class="form-group"><label>이용권 이름</label><input type="text" id="reg-ticket" required></div>
            <div class="form-group"><label>횟수</label><input type="number" id="reg-count" required></div>
            <div class="form-group"><label>시작일</label><input type="date" id="reg-start" onchange="calculateRegEndDate()" required></div>
            <div class="form-group"><label>만료일</label><input type="date" id="reg-end" required></div>
            
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button type="submit" class="btn btn-primary">등록</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="members.js"></script>
</body>
</html>
