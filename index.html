<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>        
        h1{
            background-color: black;
            text-align: center;
            letter-spacing: 0.3em;
            text-shadow: 2px 2px 2px #fff, -2px -2px 2px #fff;
        }

        .about{
            width: 800px;
            height: 500px;
            overflow: hidden;
            border: 2px solid #fff; /* 박스 테두리 */
        }
        .about img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 박스를 꽉 채우도록 조정 */
        }
        .about:hover img {
            transform: scale(1.1); /* 마우스 오버 시 이미지 확대 */
            transition: transform 0.3s ease; /* 부드러운 확대 효과 */
        }

        ul{
            display: center;
        }
        li{            
            display: inline-block;
            margin-right: 10px;
        }
        li:hover{
            color: red;
        }
        .menu{
            background-color: #f4f5d6;
            display: flex;
            text-align: center;
            letter-spacing: 0.3em;
        }

        /* 테두리를 예쁘게 보기 위한 간단한 스타일 CSS */
        table {
            width: 100%;
            border-collapse: collapse; /* 테두리 겹침 방지 */
            text-align: center;
        }
        th, td {
            width: 14.28%; /* 7개의 열이므로 100%를 7로 나눈 값 */
            border: 1px solid #ccc;
            padding: 7px;
            height: 40px; /* 셀 높이 조절 */
        }
        th {
            background-color: #f2f2f2; /* 제목 행 배경색 */
        }

        section {
            border: 1px solid #ccc;
            display: center;
        }
    </style>
</head>
<body>
    <header>
    <h1>YOGA</h1>
    <hr>    
    <nav>
        <ul class="menu">
            <li>home</li>
            <li>notice</li>
            <li>class</li>
            <li>about</li>
            <li>photo</li>
            <li>video</li>
            <li>contact</li>
        </ul>
    </nav>
    </header>

    <div class="about">
        <img src="" alt="로고 이미지">
    </div>

    <table>
        <thead>

                <th>토</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>10:00 - 11:00</td><td>교정하타</td><td>빈야사</td><td>교정하타</td><td>빈야사</td><td>교정하타</td><td rowspan="5">휴일</td>
            </tr>
            <tr>
                <td>11:00 - 12:00</td><td>빈야사</td><td>교정하타</td><td>빈야사</td><td>교정하타</td><td>빈야사</td>
            <tr>
                <td>12:00 - 18:00</td><td colspan="5">1:1개인</td>
            </tr>
             <tr>
                <td>18:00 - 19:00</td><td>빈야사</td><td>교정하타</td><td>빈야사</td><td>교정하타</td><td>빈야사</td>
            </tr>
            <tr>
                <td>19:30 - 20:30</td><td>교정하타</td><td>빈야사</td><td>교정하타</td><td>빈야사</td><td>교정하타</td>
            </tr>
        </tbody>
    </table>

        <section class="video-section">

</body>
</html>
