<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>관리자 페이지</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"맑은 고딕",sans-serif;
    background:#f4f4f4;
}

/* ===== Header ===== */

header{
    background:#6b5e5e;
    color:white;
    padding:20px;
}

header h1{
    text-align:center;
    margin-bottom:15px;
}

.menu{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.menu a{

    color:white;

    text-decoration:none;

    font-weight:bold;

}

.menu a:hover{

    color:#ffd66b;

}

/* ===== Main ===== */

main{

    max-width:1200px;

    margin:40px auto;

    padding:20px;

}

main h2{

    margin-bottom:30px;

    text-align:center;

}

/* ===== Dashboard ===== */

.dashboard{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:25px;

}

.card{

    background:white;

    border-radius:15px;

    padding:35px;

    text-align:center;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

    cursor:pointer;

    transition:.25s;

}

.card:hover{

    transform:translateY(-6px);

    background:#6b5e5e;

    color:white;

}

.card h3{

    margin-bottom:15px;

    font-size:22px;

}

.card p{

    color:#777;

}

.card:hover p{

    color:white;

}

/* ===== Footer ===== */

footer{

    text-align:center;

    padding:25px;

    margin-top:60px;

    background:#333;

    color:white;

}

/* ===== Mobile ===== */

@media(max-width:768px){

.dashboard{

grid-template-columns:1fr;

}

main{

padding:15px;

}

}

</style>

</head>

<body>

<header>

<h1>🧘 ON108 YOGA 관리자</h1>

<nav class="menu">

<a href="index.html">홈</a>

<a href="reservation.html">예약</a>

<a href="mypage.html">마이페이지</a>

<a href="#" id="logoutBtn">로그아웃</a>

</nav>

</header>

<main>

<h2>관리자 메뉴</h2>

<div class="dashboard">

<div class="card" onclick="location.href='members.html'">

<h3>👥 회원관리</h3>

<p>회원 조회 및 수정</p>

</div>

<div class="card" onclick="location.href='tickets.html'">

<h3>🎫 이용권관리</h3>

<p>횟수 추가 / 차감</p>

</div>

<div class="card" onclick="location.href='reservations.html'">

<h3>📅 예약관리</h3>

<p>예약 현황 확인</p>

</div>

<div class="card" onclick="location.href='attendance.html'">

<h3>✅ 출석관리</h3>

<p>출석 체크 및 차감</p>

</div>

<div class="card" onclick="location.href='notice.html'">

<h3>📢 공지사항</h3>

<p>공지 등록 및 수정</p>

</div>

<div class="card" onclick="location.href='statistics.html'">

<h3>📈 통계</h3>

<p>예약 및 회원 현황</p>

</div>

</div>

</main>

<footer>

© 2026 ON108 YOGA

</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
