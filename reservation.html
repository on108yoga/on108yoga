<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요가 예약</title>

    <link rel="stylesheet" href="./reservation.css">

    <!-- FullCalendar  -->
     <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/main.min.css" rel="stylesheet">
    
    <style>
        main{
             background-color: #ebebeb;
        }
        h1 {
            background-color: rgb(64, 83, 70);
            text-align: center;
            letter-spacing: 0.3em;
            text-shadow: 2px 2px 2px #fff, -2px -2px 2px #fff;
            color: rgb(64, 83, 70);
            margin: 0;
            padding: 20px 0;
        }
        h3{
            
        }
        .menu{
             display: flex;
            justify-content: center; 
            align-items: center;
            gap: 15px;
            padding: 10px;
            font-size: 14px;
        }
        .reservation{
            display: flex;
        }
        #selectedDate{          
            background-color: rgb(190, 231, 221);
        }
        button{
            background-color: #fff;
            border: 0 solid red;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.2);
        }
 
        li{
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>

    <h1>YOGA</h1>

<nav class="menu">
<a href="index.html">홈</a>
<a href="reservation.html">예약</a>
<span id="userInfo"></span>
<button id="logoutBtn">로그아웃</button>
</nav>

</header>

<main>
<hr>
<h3>Calendar</h3>
    
<!-- 캘린더 -->
<section class="week-calendar">
    <div id="calendar"></div>
</section>

    
 <!-- 예약 패널 -->
<section class="reservation-panel">

<h3>
<span id="selectedDate">
날짜를 선택하세요
</span>
</h3>

<div id="timeButtons">
<button class="time-btn" data-time="09:30">
09:30<br>
예약 <span id="count0930">0</span> / 10명
</button>

<button class="time-btn" data-time="11:00">
11:00<br>
예약 <span id="count1100">0</span> / 10명
</button>

<button class="time-btn" data-time="18:30">
18:30<br>
예약 <span id="count1830">0</span> / 10명
</button>

<button class="time-btn" data-time="20:00">
20:00<br>
예약 <span id="count2000">0</span> / 10명
</button>

</div>

<button id="reserveBtn">
예약하기
</button>

</section>

 <!-- 예약 안내 -->
<hr>
<section class="notice">
    <h3>예약 안내</h3>
    <ul>
        <li>월요일 ~ 금요일만 예약 가능합니다.</li>
        <li>토요일 · 일요일은 예약이 불가능합니다.</li>
        <li>공휴일은 예약이 불가능합니다.</li>
        <li>지난 날짜는 예약할 수 없습니다.</li>
        <li>하루 최대 예약 인원은 10명입니다.</li>
        <li>정원이 차면 자동으로 예약이 마감됩니다.</li>
    </ul>
</section>
</main>
    
<footer>
<p>© 2026 Yoga Reservation</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>

<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="calendar.js"></script>
<script type="module" src="reservation.js"></script>
    
</body>
</html>
