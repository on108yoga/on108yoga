<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요가 예약</title>

    <link rel="stylesheet" href="./reservation.css">

    <!-- FullCalendar  -->
     <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>
    
    <style>
        .navbar{
            justify-content: center;
            display: flex;
            text-align: center;
            gap: 15px;
            background-color: #517e73;       
        }
        .navbar a{
            color: white;
            text-decoration: none;
        }
        body{
            text-align: center;
        }
        h1 {
            background-color: #fff5de;
            text-align: center;
            letter-spacing: 0.3em;
            margin: 0;
            padding: 20px 0;
        }
        main{
            margin: 0;
            display: flex;
            justify-content: center; /* 가로 중앙 */
          /*  align-items: center;     /* 세로 중앙 */
            height: 100vh;
            }       
    
        section{
            width: 300px;
            text-align: center;
        }

        .custom-calendar{
             height: 180px;
        }
        
        h3{
            
        }
        .menu{
             display: flex;
            justify-content: center; 
            align-items: center;
            gap: 15px;
            padding: 10px;
            font-size: 14px;
        }
        .reservation{
            display: flex;
        }
        #selectedDate{          
            background-color: rgb(190, 231, 221);
        }
        /* 버튼 */
        button{
            background-color: #fff;
            border: 0 solid red;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }
        .time-btn{
            width: 80vw;
            margin: 0 auto;
              min-height: 100vh;
            font-size: 18px;
             background: #fff;
          border: 2px solid #87d37c;
          color: #87d37c;
        }
        .time-btn:hover:after {
          background: #87d37c;
          color: #fff;
        }
        #reserveBtn{
            font-size: 18px;
            font-weight: bold;
          background: #fff;
          border: 2px solid #abb7b7;
          color: #abb7b7;
        }
         #reserveBtn:hover:after {
           background: #abb7b7;
          color: #fff;
        }
        #logoutBtn{
             font-size: 18px;
            font-weight: bold;
        }
         
        li{
            font-size: 14px;
        }

         /* 768px 모바일&타블렛 */
        @media all and (max-width: 768px){
            main{display: flex;
                flex-direction: column;
                }
             .calendar-area{order:1;}
            .reservation-panel{order: 2;}
            .notice{order: 3;}
            footer{display: none;}
        }
    </style>
</head>

<body>

<header>   
    <nav class="menu">
    <a href="index.html">홈</a>
    <a href="reservation.html">예약</a>
    <a href="mypage.html">마이페이지</a>
    <span id="userInfo"></span>
    <button id="logoutBtn">로그아웃</button>
    </nav>
    <h1>LOGO</h1>
</header>

<main>
<hr>    
<!-- 캘린더 -->
  <section class="calendar-area">
    <h3>Calendar</h3>
    <section class="custom-calendar">    
    <div class="calendar-header">
        <button id="prevWeek">◀</button>
        <h2 id="monthTitle">
            2026년 7월
        </h2>
        <button id="nextWeek">▶</button>
    </div>
    <div class="week-name">
        <div>일</div>
        <div>월</div>
        <div>화</div>
        <div>수</div>
        <div>목</div>
        <div>금</div>
        <div>토</div>
    </div>
    <div id="weekCalendar">
    </div>
    </section>
  </section>

<hr>
    
 <!-- 예약 패널 -->
<section class="reservation-panel">

<h3>
<span id="selectedDate">
날짜를 선택하세요
</span>
</h3>

<div id="timeButtons">
<button class="time-btn" data-time="09:30">
09:30<br>
예약 <span id="count0930">0</span> / 10명
</button>

<button class="time-btn" data-time="11:00">
11:00<br>
예약 <span id="count1100">0</span> / 10명
</button>

<button class="time-btn" data-time="18:30">
18:30<br>
예약 <span id="count1830">0</span> / 10명
</button>

<button class="time-btn" data-time="20:00">
20:00<br>
예약 <span id="count2000">0</span> / 10명
</button>

</div>
<hr>
<button id="reserveBtn">
예약하기
</button>
<hr>
<div id="myReservations">

</div>

</section>

 <!-- 예약 안내 -->
<hr>
<section class="notice">
    <h3>예약 안내</h3>
    <ul>
        <li>월요일 ~ 금요일만 예약 가능합니다.</li>
        <li>토요일 · 일요일은 예약이 불가능합니다.</li>
        <li>공휴일은 예약이 불가능합니다.</li>
        <li>지난 날짜는 예약할 수 없습니다.</li>
        <li>하루 최대 예약 인원은 10명입니다.</li>
        <li>정원이 차면 자동으로 예약이 마감됩니다.</li>
    </ul>
</section>
<hr>
</main>
    
<footer>
<p>© 2026 Yoga Reservation</p>
</footer>

<script type="module" src="calendar.js"></script>
<script type="module" src="reservation.js"></script>
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
    
</body>
</html>
