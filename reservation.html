<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약</title>

    <link rel="stylesheet" href="./reservation.css">
   
</head>

<body>

<header>    
    <nav class="menu">
        <a href="index.html">홈</a>
        <a href="reservation.html">예약</a>
        <a href="mypage.html">마이페이지</a>
        <span id="userInfo"></span>
        <button id="logoutBtn">로그아웃</button>
    </nav>
    <h1>LOGO</h1>

    <!-- 사용자 프로필 및 잔여 횟수 정보 카드 -->
    <div class="user-info-card-wrapper">
        <div class="user-info-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span style="font-size: 13px; color: #6b7280; display: block; margin-bottom: 2px;">회원 정보</span>
                    <strong id="myUserName" style="font-size: 18px; color: #111827;">- 님</strong>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 13px; color: #6b7280; display: block; margin-bottom: 2px;">남은 횟수</span>
                    <strong id="myTicketCount" style="font-size: 20px; color: #4f46e5;">- 회</strong>
                </div>
            </div>
        </div>
    </div>
</header>

<main>    
               <!-- 1. 캘린더 영역 -->
            <section class="calendar-area">
                <h3>Calendar</h3>
                <div class="custom-calendar">    
                    <!-- header 인라인 style 제거 -->
                    <div class="calendar-header">
                        <!-- button/h2 인라인 style 제거 -->
                        <button id="prevWeek" type="button">◀</button>
                        <h2 id="monthTitle">2026년 7월</h2>
                        <button id="nextWeek" type="button">▶</button>
                    </div>
            
                    <!-- week-name 인라인 style 제거 -->
                    <div class="week-name">
                        <div>일</div>
                        <div>월</div>
                        <div>화</div>
                        <div>수</div>
                        <div>목</div>
                        <div>금</div>
                        <div>토</div>
                    </div>
            
                    <!-- weekCalendar 인라인 style 제거 -->
                    <div id="weekCalendar">
                        <!-- JS(calendar.js)에서 동적으로 생성 -->
                    </div>
                </div>
            </section>

    <!-- 2. 예약 패널 영역 -->
    <section class="reservation-panel">
        <h3><span id="selectedDate">날짜를 선택하세요</span></h3>

        <div id="timeButtons">
            <button type="button" class="time-btn" data-time="09:30">
                09:30 (예약 <span id="count0930">0</span> / 10명)
            </button>
            <button type="button" class="time-btn" data-time="11:00">
                11:00 (예약 <span id="count1100">0</span> / 10명)
            </button>
            <button type="button" class="time-btn" data-time="18:30">
                18:30 (예약 <span id="count1830">0</span> / 10명)
            </button>
            <button type="button" class="time-btn" data-time="20:00">
                20:00 (예약 <span id="count2000">0</span> / 10명)
            </button>
        </div>

        <button id="reserveBtn" type="button">예약하기</button>
        
        <div id="myReservations">
            <!-- 회원의 당일 예약 내역이 표시될 공간 -->
        </div>
    </section>

    <!-- 3. 예약 안내 영역 -->
    <section class="notice">
        <h3>예약 안내</h3>
        <ul>
            <li>월요일 ~ 금요일만 예약 가능합니다.</li>
            <li>토요일 · 일요일은 예약이 불가능합니다.</li>
            <li>공휴일은 예약이 불가능합니다.</li>
            <li>지난 날짜는 예약할 수 없습니다.</li>
            <li>타임별 최대 예약 인원은 10명입니다.</li>
            <li>정원이 차면 자동으로 예약이 마감됩니다.</li>
        </ul>
    </section>
</main>
    
<footer>
    <p>© 2026 Yoga Reservation</p>
</footer>

<!-- 스크립트 모듈 연동 -->
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="calendar.js"></script>
<script type="module" src="reservation.js"></script>
    
</body>
</html>
