<head>

    <title>Document</title>
     <!-- 구글 폰트 및 프리텐다드 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

    <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <style>
   @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@200;300;400;500;700&display=swap');
 
     * {
        box-sizing: border-box;
        }
        
        body {
            text-align: center;
            margin: 0;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }
        .navbar{
               justify-content: center;
                display: flex;
                text-align: center;
                align-items: center;
                gap: 15px;
                background-color: #517e73;
                padding: 10px;
                font-size: 14px;     
        }
        .navbar a{
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
         .navbar a:hover {
            text-decoration: underline;
        }
        
        body{
            width: 100%;
            text-align: center;
        }
        h1 {
                background-color: #f4efe6; /* 따뜻하고 세련된 샌드 베이지 */
            color: #3f4e43;            /* 딥 그린 폰트 컬러 */
            text-align: center;
            letter-spacing: 0.35em;
            margin: 0;
            padding: 12px 0;           /* 🔥 높이 축소 */
            font-family: 'Cormorant Garamond', 'Noto Sans KR', serif;
            font-weight: 300;
            font-size: 20px;
            text-transform: uppercase;
                }
        /* 메인 */
    main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .signup-container {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(63, 78, 67, 0.08); /* 브랜드 컬러 기반 부드러운 그림자 */
            border: 1px solid #eae6df;
        }

        .signup-container h2 {
            font-size: 22px;
            font-weight: 600;
            color: #3f4e43;
            margin-bottom: 28px;
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            background-color: #fafafa;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus {
            border-color: #517e73;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(81, 126, 115, 0.15);
        }

        /* Checkbox Styling */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            margin-bottom: 28px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #517e73;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        /* Submit Button */
        #signupBtn {
            width: 100%;
            padding: 16px;
            background-color: #3f4e43;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        #signupBtn:hover {
            background-color: #2d3830;
        }

        #signupBtn:active {
            transform: scale(0.99);
        }

        /* Bottom Login Link */
        .login-link {
            margin-top: 24px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        .login-link a {
            color: #517e73;
            font-weight: 600;
            text-decoration: none;
            margin-left: 6px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* 3. Footer */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
            background-color: #f4efe6;
            border-top: 1px solid #eae6df;
        }
    </style>
</head>

<body>

<header>
    <nav class="navbar">
        <a href="index.html">홈</a>
        <a href="login.html">로그인</a>
    </nav>
    
    <h1>
    ON108 YOGA
    <span style="display: block; font-size: 11px; font-weight: 200; letter-spacing: 0.2em; margin-top: 4px; color: #777;">
        온108요가
    </span>
    </h1>
</header>

<main>

<section class="signup-container">

    <h2>회원가입</h2>

    <form id="signupForm">

        <div class="form-group">
            <label for="name">이름</label>
            <input
                type="text"
                id="name"
                placeholder="이름을 입력하세요"
                required>
        </div>

        <div class="form-group">
            <label>전화번호</label>                
                <input
                    type="text"
                    id="phone"
                    placeholder="01012345678"
                    required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                placeholder="비밀번호"
                required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">비밀번호 확인</label>
            <input
                type="password"
                id="confirmPassword"
                placeholder="비밀번호를 다시 입력하세요"
                required>
        </div>

        <div class="form-group">
            <label>
                <input
                    type="checkbox"
                    id="agree"
                    required>

                개인정보 처리방침에 동의합니다.
            </label>
        </div>

        <button type="submit" id="signupBtn">
            회원가입
        </button>

    </form>

    <div class="login-link">

        이미 회원이신가요?

        <a href="login.html">
            로그인
        </a>

    </div>

</section>

</main>

<footer>

    <p>© 2026 Reservation System</p>

</footer>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="auth.js"></script>
    
</body>
</html>
